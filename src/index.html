<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student LMS Portal</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; }
        header { background: #003366; color: white; padding: 1rem; text-align: center; }
        .container { padding: 2rem; display: flex; gap: 20px; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 250px; text-align: center; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>Student Learning Management System</h1>
        <p>Welcome to your online study portal</p>
    </header>
    <div class="container">
        <div class="card">
            <h3>My Courses</h3>
            <p>View your enrolled classes.</p>
            <button>Go to Courses</button>
        </div>
        <div class="card">
            <h3>Assignments</h3>
            <p>Check pending deadlines.</p>
            <button>View Tasks</button>
        </div>
        <div class="card">
            <h3>Profile</h3>
            <p>Manage your account.</p>
            <button>Settings</button>
        </div>
    </div>
</body>
</html>
